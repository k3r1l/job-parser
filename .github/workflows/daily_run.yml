name: Daily Job Check

on:
  schedule:
    - cron: "0 10 * * 1-5"   # 10:00 UTC Mon–Fri (adjust to taste)
  workflow_dispatch:          # allows manual trigger from GitHub UI

jobs:
  check-jobs:
    runs-on: ubuntu-latest
    permissions:
      contents: write         # needed to push seen_jobs.json back

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run job parser
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Persist job data and report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json data/report.html
          git diff --staged --quiet || git commit -m "chore: update jobs [skip ci]"
          git push
